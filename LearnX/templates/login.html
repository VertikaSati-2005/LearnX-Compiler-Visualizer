<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • Time-Bound Mini Compiler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <h1>Time-Bound Mini Compiler</h1>
          <p class="subtitle">Login to continue</p>
        </div>
      </header>

      <main class="grid" style="grid-template-columns: 1fr; max-width: 520px; margin: 0 auto;">
        <section class="panel">
          <div class="panel-header">
            <h2>Login</h2>
          </div>
          <form method="post" action="{{ url_for('login') }}" style="padding: 14px;">
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <label>Email</label>
            <input
              name="email"
              type="email"
              required
              style="width: 100%; margin: 8px 0 12px; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.2); color: #e7ecf7;"
            />

            <label>Password</label>
            <input
              name="password"
              type="password"
              required
              style="width: 100%; margin: 8px 0 16px; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.2); color: #e7ecf7;"
            />

            <button class="btn btn-primary" type="submit">Login</button>
            <a class="btn" href="{{ url_for('signup_page') }}">Signup</a>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
